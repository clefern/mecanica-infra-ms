# Stack completo — zero install (só Docker Desktop necessário).
# Requer: GITHUB_TOKEN no .env (para build do shared-kernel via GitHub Packages).
# Requer: repos clonados em /Volumes/Workspace/ (layout padrão do projeto).
#
# Uso: docker compose -f docker-compose.full.yml up --build
# Ponto único de entrada (via Traefik): http://localhost

include:
  - docker-compose.infra.yml

services:

  os-service:
    build:
      context: ../../ms-os-service
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: mecanica-os-service
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres-os:5432/os_service
      DB_USER: ${DB_USER:-mecanica}
      DB_PASS: ${DB_PASS:-mecanica}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-ZGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudE9ubHkzMkJ5dGVz}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.os-service.rule=PathPrefix(`/api/auth`) || PathPrefix(`/api/ordens-servico`)"
      - "traefik.http.routers.os-service.entrypoints=web"
      - "traefik.http.services.os-service.loadbalancer.server.port=8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-os:
        condition: service_healthy

  billing-service:
    build:
      context: ../../ms-billing-service
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: mecanica-billing-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres-billing:5432/billing_service
      DB_USER: ${DB_USER:-mecanica}
      DB_PASS: ${DB_PASS:-mecanica}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-TEST-placeholder-token}
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-ZGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudE9ubHkzMkJ5dGVz}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.billing-service.rule=PathPrefix(`/api/billing`)"
      - "traefik.http.routers.billing-service.entrypoints=web"
      - "traefik.http.services.billing-service.loadbalancer.server.port=8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy

  inventory-service:
    build:
      context: ../../ms-inventory-service
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: mecanica-inventory-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres-inventory:5432/inventory_service
      DB_USER: ${DB_USER:-mecanica}
      DB_PASS: ${DB_PASS:-mecanica}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-ZGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudE9ubHkzMkJ5dGVz}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inventory-service.rule=PathPrefix(`/api/estoque`)"
      - "traefik.http.routers.inventory-service.entrypoints=web"
      - "traefik.http.services.inventory-service.loadbalancer.server.port=8082"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-inventory:
        condition: service_healthy

  workshop-service:
    build:
      context: ../../ms-workshop-service
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: mecanica-workshop-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      MONGODB_URI: mongodb://mongodb-workshop:27017/workshop_service
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-ZGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudE9ubHkzMkJ5dGVz}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.workshop-service.rule=PathPrefix(`/api/execucoes`)"
      - "traefik.http.routers.workshop-service.entrypoints=web"
      - "traefik.http.services.workshop-service.loadbalancer.server.port=8083"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb-workshop:
        condition: service_healthy
